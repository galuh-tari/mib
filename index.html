<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Metrics — Sign In / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #6C27D9;
      --purple-dark: #4B0FAD;
      --white: #ffffff;
      --gray-bg: #ffffff;        /* background luar → putih */
      --form-bg: #E8E8E8;        /* sisi kiri card → abu-abu */
      --input-bg: #ffffff;       /* input → putih agar kontras di atas abu */
      --text: #1a1a2e;
      --muted: #888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-bg);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      width: 100%;
      max-width: 900px;
      padding: 20px;
      z-index: 10;
    }

    .card {
      display: none;
      width: 100%;
      background: var(--white);
      border-radius: 32px;
      box-shadow: 0 30px 70px rgba(108,39,217,0.15);
      position: relative;
    }
    .card.active { display: flex; }

    /* SISI KIRI: background abu-abu */
    .form-side {
      flex: 1;
      padding: 40px 50px;
      z-index: 50;
      position: relative;
      background: var(--form-bg);
      border-radius: 32px 0 0 32px;
    }

    .banner-side {
      flex: 1;
      background: linear-gradient(155deg, var(--purple) 0%, var(--purple-dark) 100%);
      padding: 40px;
      border-radius: 0 32px 32px 0;
      position: relative;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow: visible !important;
    }

    .banner-side h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 12px;
      position: relative;
      z-index: 60;
    }

    .banner-side p {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      position: relative;
      z-index: 60;
    }

    .banner-img {
      position: absolute;
      bottom: -70px;
      right: -430px;
      left: auto;
      width: 185%;
      height: auto;
      pointer-events: none;
      z-index: 40;
      filter: drop-shadow(20px 20px 50px rgba(0,0,0,0.3));
      object-fit: contain;
      object-position: right bottom;
    }

    /* FORM STYLING */
    .form-side h2 { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; }

    /* Input putih agar kontras di atas abu */
    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1.5px solid #d0d0d0;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      color: var(--text);
    }
    input:focus { border-color: var(--purple); }

    .btn-primary { margin-top: 24px; width: 100%; padding: 14px; background: var(--purple); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: var(--purple-dark); transform: translateY(-2px); }
    .switch-link { margin-top: 20px; font-size: 13px; text-align: center; color: var(--muted); }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: #fff; padding: 12px 28px; border-radius: 12px; transition: 0.5s; z-index: 1000; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 850px) {
      body { overflow-y: auto; height: auto; }
      .card { flex-direction: column; }
      .form-side { border-radius: 24px 24px 0 0; }
      .banner-side { border-radius: 0 0 24px 24px; min-height: 250px; }
      .banner-img { width: 130%; right: -20px; bottom: -30px; left: auto; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="stage">
  <!-- SIGN IN CARD -->
  <div class="card active" id="card-signin">
    <div class="form-side">
      <h2>Sign in to your account</h2>
      <label>Email Address</label>
      <input type="email" id="signin-email" placeholder="you@example.com" />
      <label>Password</label>
      <div style="position:relative;">
        <input type="password" id="signin-password" placeholder="••••••••" style="padding-right:44px;" />
        <i data-lucide="eye" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#aaa; width:18px;" onclick="togglePassword('signin-password', this)"></i>
      </div>
      <button class="btn-primary" onclick="handleSignIn()">SIGN IN</button>
      <p class="switch-link">Don't have an account? <a onclick="showPanel('signup')" style="color:var(--purple); font-weight:700; cursor:pointer;">Sign up here.</a></p>
    </div>
    <div class="banner-side">
      <h1>WELCOME<br/>BACK!</h1>
      <p>Smarter Decisions Start with Better Health Metrics.</p>
      <img class="banner-img" src="index.png" alt="Illustration" />
    </div>
  </div>

  <!-- SIGN UP CARD -->
  <div class="card" id="card-signup">
    <div class="form-side">
      <h2>Create your account</h2>
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" />
      <label>Password</label>
      <div style="position:relative;">
        <input type="password" id="signup-password" placeholder="••••••••" style="padding-right:44px;" />
        <i data-lucide="eye" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#aaa; width:18px;" onclick="togglePassword('signup-password', this)"></i>
      </div>
      <label>Confirm Password</label>
      <!-- DITAMBAH: eye toggle di confirm password -->
      <div style="position:relative;">
        <input type="password" id="signup-confirm" placeholder="••••••••" style="padding-right:44px;" />
        <i data-lucide="eye" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:#aaa; width:18px;" onclick="togglePassword('signup-confirm', this)"></i>
      </div>
      <button class="btn-primary" onclick="handleSignUp()">SIGN UP</button>
      <p class="switch-link">Already have an account? <a onclick="showPanel('signin')" style="color:var(--purple); font-weight:700; cursor:pointer;">Sign in here.</a></p>
    </div>
    <div class="banner-side">
      <h1>WELCOME!</h1>
      <p>Smarter Decisions Start with Better Health Metrics.</p>
      <img class="banner-img" src="4949532_19799.png" alt="Illustration" />
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB4aNTSgU5wLoarKUGduLnpbwS9gI13PU4",
    authDomain: "manajemen-informasi-biomedis.firebaseapp.com",
    projectId: "manajemen-informasi-biomedis",
    storageBucket: "manajemen-informasi-biomedis.firebasestorage.app",
    messagingSenderId: "80926759256",
    appId: "1:80926759256:web:123e1e293638aa4e892d2d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  lucide.createIcons();

  window.togglePassword = function(id, icon) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
    icon.setAttribute('data-lucide', input.type === "password" ? 'eye' : 'eye-off');
    lucide.createIcons();
  };

  window.showPanel = function(panel) {
    document.getElementById('card-signin').style.display = panel === 'signin' ? 'flex' : 'none';
    document.getElementById('card-signup').style.display = panel === 'signup' ? 'flex' : 'none';
  };

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  window.handleSignIn = async function() {
    const e = document.getElementById('signin-email').value.trim();
    const p = document.getElementById('signin-password').value;
    if(!e || !p) return showToast("Isi semua data!", "error");
    try {
      await signInWithEmailAndPassword(auth, e, p);
      showToast("Berhasil masuk!", "success");
      setTimeout(() => window.location.href='dashboard.html', 1000);
    } catch (err) { showToast("Gagal masuk!", "error"); }
  };

  window.handleSignUp = async function() {
    const e = document.getElementById('signup-email').value.trim();
    const p = document.getElementById('signup-password').value;
    const c = document.getElementById('signup-confirm').value;
    if(!e || !p) return showToast("Isi semua data!", "error");
    if(p !== c) return showToast("Password beda!", "error");
    try {
      await createUserWithEmailAndPassword(auth, e, p);
      showToast("Berhasil daftar!", "success");
      setTimeout(() => window.location.href='dashboard.html', 1000);
    } catch (err) { showToast("Gagal daftar!", "error"); }
  };
</script>
</body>
</html>
